stages:
    - install_node_modules
    - eslint
    - frontend_unit_test
    - install_python_modules
    - pylint
    - django_unit_test
    - sonarqube_analysis

cache:
    paths:
        - frontend/node_modules

install_node_modules:
    stage: install_node_modules
    script:
        - cd frontend
        - npm install

eslint:
    stage: eslint
    script:
        - cd frontend
        - npm run lint

frontend_unit_test:
    stage: frontend_unit_test
    script:
        - cd frontend
        - npm run test:unit

install_python_modules:
    stage: install_python_modules
    script:
        - pip3 install -r backend/business-server/requirements.txt

pylint:
    stage: pylint
    before_script:
        - touch backend/business-server/__init__.py
    script:
        - pylint --ignore=migrations --exit-zero backend/business-server

django_unit_test:
    stage: django_unit_test
    before_script:
        - python3 backend/business-server/manage.py migrate
    script:
        - python3 backend/business-server/manage.py test

sonarqube_analysis:
    stage: sonarqube_analysis
    script:
        - sonar-scanner
